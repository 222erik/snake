name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install SDL3 and SDL3_image (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install build-essential git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev \
          libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

          git clone https://github.com/libsdl-org/SDL.git
          cd SDL

          cmake -S . -B build -G Ninja
          cmake --build build
          sudo cmake --install build

          cd ..
          git clone https://github.com/libsdl-org/SDL_image.git
          cd SDL_image

          cmake -S . -B build -G Ninja
          cmake --build build
          sudo cmake --install build

          sudo ldconfig
      
      - name: Create build directory
        run: mkdir -p build
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
      - name: Build & zip
        run: |
          cmake --build build --config Release
          mv build/snake .
          zip -r snake-linux.zip resources snake
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-linux
          path: snake-linux.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install SDL3 and SDL3_image
        run: |
          vcpkg install sdl3:x64-windows
          vcpkg install sdl3-image:x64-windows

      - name: Create build directory
        run: mkdir build
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
      
      - name: Build
        run: cmake --build build --config Release

      - name: Copy SDL3.dll, SDL3_image.dll and zip
        run: |
          copy C:\vcpkg\installed\x64-windows\bin\SDL3.dll .
          copy C:\vcpkg\installed\x64-windows\bin\SDL3_image.dll .
          move build\Release/snake.exe .
          tar -a -c -f snake-windows.zip resources snake.exe SDL3.dll SDL3_image.dll
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: snake-windows
          path: snake-windows.zip
